server.port=7082
spring.application.name=biz-feature-dem-sweb
enc.key=X9mKp2vQrLzN4wB8cFtV6sDhJ1yR3aE7
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.XADataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.JndiDataSourceAutoConfiguration,org.springframework.boot.autoconfigure.data.jdbc.JdbcRepositoriesAutoConfiguration,com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
# ---- Swagger/OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# ---- Nacos RPC 框架配置 (nacos.rpc.*) ----
nacos.rpc.enabled=true
nacos.rpc.server-addr=127.0.0.1:8848
nacos.rpc.group=DEFAULT_GROUP
# ---- Nacos Config 配置 (ttd.nacos.*) ----
ttd.nacos.server-addr=127.0.0.1:8848
ttd.nacos.namespace=dev
ttd.nacos[0].namespace=dev
ttd.nacos[0].group=biz-feature-dem-sweb
ttd.nacos[0].dataId=application.properties
ttd.nacos[1].namespace=dev
ttd.nacos[1].group=DEFAULT_GROUP
ttd.nacos[1].dataId=db-slave-rcs.properties
logging.config=classpath:logback-spring.xml
logging.level.org.springframework.web.servlet.handler=DEBUG
ttd.load.slave.rcs.enable=true
ttd.load.slave.rcs.mybatis.enable=true
ttd.load.slave.rcs.jdbc.enable=true
