server:
  port: 7082

enc:
  key: X9mKp2vQrLzN4wB8cFtV6sDhJ1yR3aE7

# Nacos 远程配置拉取
ttd:
  nacos:
    - dataId: mysql.properties
      group: ttd-feature

spring:
  application:
    name: biz-ttd-admin-srv
  datasource:
    url: jdbc:mysql://localhost:3306/tcbiz_feature?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: admin123
    hikari:
      minimum-idle: 10
      maximum-pool-size: 100
      idle-timeout: 30000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      auto-commit: false
      transaction-isolation-level: READ_COMMITTED
      max-lifetime: 300000
      max-pool-size: 100
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  groovy:
    template:
      check-template-location: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:/mapper/**/*.xml

logging:
  config: classpath:logback-spring.xml
  level:
    org.springframework.web.servlet.handler: DEBUG
  #  file:
  #     path: ./logs
  #   name: ./logs/biz-ttd-srv.log




# ==================== SpringDoc OpenAPI ====================
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list
    default-model-expand-depth: 1
    default-models-expand-depth: 1
  default-flat-param-object: true
  show-actuator: false
  writer-with-default-pretty-printer: true

oss:
  file:
    path: ${user.home}/oss
